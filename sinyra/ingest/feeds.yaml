# RSS/Atom feed sources and Google News queries
# Fields:
#   name     : human-readable label (used as source_name on RawItem)
#   url      : feed URL (rss/atom only)
#   query    : search query string (gnews only)
#   type     : rss | gnews
#   company  : (optional) company slug → stored as hint_company on RawItem

feeds:
  # ── Major AI labs ──────────────────────────────────────────────────────────
  - name: OpenAI Blog
    url: https://openai.com/blog/rss/
    type: rss
    company: openai

  - name: Anthropic News
    url: https://www.anthropic.com/news/rss
    type: rss
    company: anthropic

  - name: Google DeepMind Blog
    url: https://deepmind.google/blog/rss/
    type: rss
    company: google-deepmind

  - name: Meta AI Blog
    url: https://ai.meta.com/blog/feed/
    type: rss
    company: meta

  - name: Mistral AI Blog
    url: https://mistral.ai/feed.xml
    type: rss
    company: mistral

  # ── Tech news ───────────────────────────────────────────────────────────────
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    type: rss

  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    type: rss

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    type: rss

  - name: Ars Technica AI
    url: https://feeds.arstechnica.com/arstechnica/technology-lab
    type: rss

  # ── Research ────────────────────────────────────────────────────────────────
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    type: rss

  # ── Google News queries ─────────────────────────────────────────────────────
  - name: GNews · AI product launch
    query: AI product launch new feature model
    type: gnews

  - name: GNews · open source LLM
    query: open source large language model release
    type: gnews
