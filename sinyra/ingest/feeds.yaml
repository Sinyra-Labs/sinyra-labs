# RSS/Atom feed sources and Google News queries
# Fields:
#   name     : human-readable label (used as source_name on RawItem)
#   url      : feed URL (rss/atom only)
#   query    : search query string (gnews only)
#   type     : rss | gnews
#   company  : (optional) company slug → stored as hint_company on RawItem

feeds:
  # ── Major AI labs ──────────────────────────────────────────────────────────
  # OpenAI: /blog/rss/ → 403 after site redesign; moved to /news/rss.xml
  - name: OpenAI News
    url: https://openai.com/news/rss.xml
    type: rss
    company: openai

  # Anthropic: no native RSS; using Olshansk/rss-feeds scraped proxy (updated hourly)
  - name: Anthropic News
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml
    type: rss
    company: anthropic

  - name: Anthropic Engineering
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml
    type: rss
    company: anthropic

  # DeepMind: /blog/rss/ → 404; correct path is /blog/rss.xml
  - name: Google DeepMind Blog
    url: https://deepmind.google/blog/rss.xml
    type: rss
    company: google-deepmind

  # Meta AI: no native RSS; using Olshansk/rss-feeds scraped proxy
  - name: Meta AI Blog
    url: https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_meta_ai.xml
    type: rss
    company: meta

  # Mistral: no native RSS feed → replaced with Google News query below

  # ── Tech news ───────────────────────────────────────────────────────────────
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    type: rss

  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    type: rss

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    type: rss

  - name: Ars Technica AI
    url: https://feeds.arstechnica.com/arstechnica/technology-lab
    type: rss

  # ── Research ────────────────────────────────────────────────────────────────
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    type: rss

  # ── Google News queries ─────────────────────────────────────────────────────
  - name: GNews · AI product launch
    query: AI product launch new feature model
    type: gnews

  - name: GNews · open source LLM
    query: open source large language model release
    type: gnews

  # Mistral has no native RSS feed
  - name: GNews · Mistral AI
    query: Mistral AI release OR model OR update
    type: gnews
    company: mistral
