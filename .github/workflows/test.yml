name: Sinyra · Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install uv
          uv pip install --system -e .
          uv pip install --system \
            pytest pytest-recording vcrpy \
            mypy ruff \
            types-Jinja2 types-PyYAML

      - name: Ruff lint
        run: ruff check sinyra/ tests/

      - name: Ruff format check
        run: ruff format --check sinyra/ tests/

      - name: mypy
        run: mypy sinyra/

      - name: pytest (unit)
        run: pytest tests/unit/ -v

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: .pytest_cache/
          retention-days: 7

      - name: Notify failure (Slack)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"❌ Sinyra test/lint başarısız — ${{ github.ref_name }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
