name: Sinyra · Tests & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-recording vcrpy mypy ruff

      - name: Ruff lint
        run: ruff check sinyra/ tests/

      - name: Ruff format check
        run: ruff format --check sinyra/ tests/

      - name: mypy
        run: mypy sinyra/

      - name: pytest (unit)
        run: pytest tests/unit/ -v
