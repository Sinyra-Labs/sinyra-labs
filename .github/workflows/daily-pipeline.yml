name: Sinyra · Daily Intelligence Run

on:
  schedule:
    # TR 18:00 (UTC+3) = UTC 15:00. GHA queue typically adds 5-15 min,
    # so actual mail delivery is ~18:15 TR — acceptable per spec.
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Geriye dönük tarama saati'
        required: false
        default: '72'
      dry_run:
        description: 'Mail gönderme, sadece logla'
        type: boolean
        default: false

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps (uv)
        run: |
          pip install uv
          uv pip install --system -e .

      - name: Restore seen-hashes cache
        uses: actions/cache@v4
        with:
          path: data/sinyra.db
          key: seen-db-${{ github.run_id }}
          restore-keys: seen-db-

      - name: Run pipeline
        env:
          OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS:           ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM_NAME:         ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_TO:                ${{ secrets.EMAIL_TO }}
          EMAIL_PROVIDER:          gmail_smtp
          GSHEET_ID:               ${{ secrets.GSHEET_ID }}
          GSHEET_GID:              ${{ secrets.GSHEET_GID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRY_RUN:                 ${{ github.event.inputs.dry_run || 'false' }}
          LOOKBACK_HOURS:          ${{ github.event.inputs.lookback_hours || '72' }}
          DB_PATH:                 data/sinyra.db
        run: python -m sinyra.run

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sinyra-run-${{ github.run_id }}
          path: |
            data/output/
            data/logs/
          retention-days: 30

      - name: Notify failure (Slack)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ Sinyra daily pipeline başarısız — Run #${{ github.run_id }} — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
